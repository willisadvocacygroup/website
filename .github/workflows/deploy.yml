# Willis Advocacy Group — Auto-Deploy to Hostinger
# Triggered on every push to main branch
# Deploys website files via FTP to Hostinger public_html
#
# Required GitHub Secrets (Settings → Secrets → Actions → New repository secret):
#   FTP_SERVER   — Your Hostinger FTP hostname (e.g. files.000webhost.com or willisadvocacygroup.com)
#   FTP_USERNAME — Your Hostinger FTP username
#   FTP_PASSWORD — Your Hostinger FTP password
#
# To find these in Hostinger: hPanel → Hosting → willisadvocacygroup.com → Files → FTP Accounts

name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger from GitHub Actions UI

jobs:
  deploy:
    name: FTP Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via FTP to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./
          server-dir: /public_html/
          timeout: 60000
          log-level: standard
          security: loose
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/webhook-server/**
            **/ghl-config/**
            **/.env*
            **/images/logos/node_modules/**
            **/images/logos/png/**
            **/Willis-Advocacy-Group-System-Workflow.html
