# The R.E.B.U.I.L.D. Method — Auto-Deploy to Hostinger
# Deploys therebuildmethod-site/ to therebuildmethod.com public_html via FTP
#
# Uses the SAME main FTP credentials as Willis Advocacy Group (FTP_USERNAME, FTP_PASSWORD).
# The main Hostinger FTP user (u144249280) can access all addon domains.
# FTP Server:   157.173.214.130
# FTP Path:     /domains/therebuildmethod.com/public_html/
#
# NOTE: If this fails with "Login incorrect", go to:
#   Hostinger → therebuildmethod.com → FTP Accounts → set password for u144249280.therebuildmethod.com
#   Then add GitHub Secret FTP_PASSWORD_REBUILD and update this workflow to use that secret.

name: Deploy Rebuild Method Site

on:
  push:
    branches:
      - main
    paths:
      - 'therebuildmethod-site/**'
  workflow_dispatch:

jobs:
  deploy:
    name: FTP Deploy — therebuildmethod.com
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via FTP to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./therebuildmethod-site/
          server-dir: /domains/therebuildmethod.com/public_html/
          timeout: 60000
          log-level: standard
          security: loose
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
