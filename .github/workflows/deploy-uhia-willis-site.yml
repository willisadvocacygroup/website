# Uhia Willis Speaker Site — Auto-Deploy to Hostinger
# Deploys uhiawillis-site/ to uhiawillis.com public_html via FTP
#
# FTP Server:   157.173.214.130
# FTP Path:     /domains/uhiawillis.com/public_html/
#
# Trigger: any push to main that touches uhiawillis-site/ OR manual dispatch

name: Deploy Uhia Willis Speaker Site

on:
  push:
    branches:
      - main
    paths:
      - 'uhiawillis-site/**'
  workflow_dispatch:

jobs:
  deploy:
    name: FTP Deploy — uhiawillis.com
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via FTP to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./uhiawillis-site/
          server-dir: /domains/uhiawillis.com/public_html/
          timeout: 60000
          log-level: standard
          security: loose
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
