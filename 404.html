<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Willis Advocacy Group</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0C1B2E;
      --teal: #0D7377;
      --teal2: #14A085;
      --gold: #C8972A;
      --cream: #FAF7F2;
    }
    body {
      font-family: 'Nunito', sans-serif;
      background: var(--cream);
      color: var(--navy);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .brand {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: var(--navy);
      margin-bottom: 2rem;
    }
    .brand span { color: var(--teal); }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 10vw, 6rem);
      color: var(--teal);
      line-height: 1;
    }
    h2 {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 1rem 0 0.5rem;
    }
    p { color: #5a6a7a; max-width: 400px; line-height: 1.6; }
    .btn {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.9rem 2rem;
      background: var(--teal);
      color: #fff;
      text-decoration: none;
      border-radius: 6px;
      font-weight: 700;
      font-size: 1rem;
      transition: background 0.2s;
    }
    .btn:hover { background: var(--teal2); }
    .tagline {
      margin-top: 3rem;
      font-size: 0.85rem;
      color: var(--gold);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="brand">Willis <span>Advocacy</span> Group</div>
  <h1>404</h1>
  <h2>Page Not Found</h2>
  <p>The page you're looking for doesn't exist or has been moved. Let us get you back on track.</p>
  <a href="/" class="btn">Back to Home</a>
  <p class="tagline">People Over Profits.</p>
</body>
</html>
