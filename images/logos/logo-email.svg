<!-- Willis Advocacy Group — Email Signature Logo -->
<!-- Use: Gmail/Google Workspace email signature -->
<!-- Render to PNG at 2x (440x120px) for retina — see convert-to-png.js -->
<!-- Optimized for horizontal display at ~220px wide -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 60" role="img" aria-label="Willis Advocacy Group">
  <title>Willis Advocacy Group</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;family=JetBrains+Mono:wght@400&amp;display=swap');
      .wag-name { font-family: 'Playfair Display', Georgia, serif; }
      .wag-tagline { font-family: 'JetBrains Mono', 'Courier New', monospace; }
    </style>
    <linearGradient id="shieldGradE" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0C1B2E"/>
      <stop offset="100%" style="stop-color:#14304e"/>
    </linearGradient>
  </defs>

  <!-- Shield: 40x46px -->
  <svg x="5" y="7" width="40" height="46" viewBox="0 0 100 115">
    <path d="M 5,12 L 95,12 L 95,62 C 95,90 72,108 50,113 C 28,108 5,90 5,62 Z"
          fill="url(#shieldGradE)"/>
    <path d="M 5,12 L 95,12 L 95,62 C 95,90 72,108 50,113 C 28,108 5,90 5,62 Z"
          fill="none" stroke="#C8972A" stroke-width="2.5"/>
    <polyline points="24,28 33,70 50,46 67,70 76,28"
              fill="none" stroke="#C8972A" stroke-width="5.5"
              stroke-linejoin="round" stroke-linecap="round"/>
    <line x1="27" y1="80" x2="73" y2="80"
          stroke="#C8972A" stroke-width="1.2" opacity="0.65"/>
    <circle cx="50" cy="91" r="2.8" fill="#0D7377"/>
  </svg>

  <!-- Separator -->
  <line x1="53" y1="10" x2="53" y2="50" stroke="#C8972A" stroke-width="0.8" opacity="0.5"/>

  <!-- Brand name -->
  <text x="61" y="28"
        class="wag-name"
        font-size="15" font-weight="700"
        fill="#0C1B2E"
        letter-spacing="0.2">Willis Advocacy Group</text>

  <!-- Tagline -->
  <text x="61" y="42"
        class="wag-tagline"
        font-size="8.5" font-weight="400"
        fill="#0D7377"
        letter-spacing="0.12em">People Over Profits.</text>

  <!-- Licensed broker line -->
  <text x="61" y="54"
        class="wag-tagline"
        font-size="7" font-weight="400"
        fill="#5a7080"
        letter-spacing="0.06em">Licensed Insurance Broker · (774) 446-0701</text>

</svg>
