<!-- Willis Advocacy Group — Social Media Profile (Square) -->
<!-- Use: Facebook, Instagram, LinkedIn, X/Twitter profile photo -->
<!-- 400x400 square — crop-safe: all content within center 300x300 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="Willis Advocacy Group">
  <title>Willis Advocacy Group</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&amp;family=JetBrains+Mono:wght@400;600&amp;display=swap');
      .wag-name { font-family: 'Playfair Display', Georgia, serif; }
      .wag-tag { font-family: 'JetBrains Mono', 'Courier New', monospace; }
    </style>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0C1B2E"/>
      <stop offset="100%" style="stop-color:#0e2540"/>
    </linearGradient>
    <linearGradient id="shieldGradS" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D7377"/>
      <stop offset="100%" style="stop-color:#0a5e62"/>
    </linearGradient>
  </defs>

  <!-- Navy background -->
  <rect width="400" height="400" fill="url(#bgGrad)"/>

  <!-- Subtle teal glow -->
  <ellipse cx="200" cy="160" rx="140" ry="120" fill="#0D7377" opacity="0.07"/>

  <!-- Gold top accent bar -->
  <rect x="0" y="0" width="400" height="4" fill="#C8972A"/>

  <!-- Shield centered — 160px wide, 184px tall -->
  <!-- Scale: 160/100 = 1.6, height = 115*1.6 = 184 -->
  <!-- Position: x = (400-160)/2 = 120, y = 55 -->
  <svg x="120" y="55" width="160" height="184" viewBox="0 0 100 115">

    <!-- Shield body teal -->
    <path d="M 5,12 L 95,12 L 95,62 C 95,90 72,108 50,113 C 28,108 5,90 5,62 Z"
          fill="url(#shieldGradS)"/>

    <!-- Gold shield border -->
    <path d="M 5,12 L 95,12 L 95,62 C 95,90 72,108 50,113 C 28,108 5,90 5,62 Z"
          fill="none" stroke="#C8972A" stroke-width="2.5"/>

    <!-- Inner border -->
    <path d="M 10,17 L 90,17 L 90,62 C 90,86 70,103 50,108 C 30,103 10,86 10,62 Z"
          fill="none" stroke="#F0C060" stroke-width="0.8" opacity="0.5"/>

    <!-- W in gold/cream -->
    <polyline points="24,28 33,70 50,46 67,70 76,28"
              fill="none" stroke="#F0C060" stroke-width="6"
              stroke-linejoin="round" stroke-linecap="round"/>

    <line x1="27" y1="80" x2="73" y2="80"
          stroke="#F0C060" stroke-width="1.5" opacity="0.7"/>

    <circle cx="50" cy="91" r="3" fill="white" opacity="0.9"/>
  </svg>

  <!-- Brand name — white, centered -->
  <text x="200" y="272"
        class="wag-name"
        font-size="28" font-weight="700"
        fill="white"
        text-anchor="middle"
        letter-spacing="0.5">Willis Advocacy Group</text>

  <!-- Tagline — gold, centered -->
  <text x="200" y="300"
        class="wag-tag"
        font-size="13" font-weight="400"
        fill="#F0C060"
        text-anchor="middle"
        letter-spacing="0.18em">People Over Profits.</text>

  <!-- Gold divider line -->
  <line x1="140" y1="316" x2="260" y2="316" stroke="#C8972A" stroke-width="0.8" opacity="0.5"/>

  <!-- Licensed text — muted, small -->
  <text x="200" y="334"
        class="wag-tag"
        font-size="9" font-weight="400"
        fill="rgba(255,255,255,0.4)"
        text-anchor="middle"
        letter-spacing="0.1em">Licensed Medicare &amp; Life Insurance · Webster, MA</text>

  <!-- Gold bottom accent bar -->
  <rect x="0" y="396" width="400" height="4" fill="#C8972A"/>

</svg>
